name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain (mise → Node 24)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (ncc)
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ がソースと一致しません。'npm run build' を実行してコミットしてください。"
            exit 1
          fi
