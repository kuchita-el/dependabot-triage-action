name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain (mise → Node 24)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      # ncc がバンドル可能かを検証する。dist/ は VCS 管理外のためコミット差分は確認しない。
      - name: Build (ncc)
        run: npm run build
