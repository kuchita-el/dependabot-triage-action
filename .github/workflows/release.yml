name: Release (immutable vX.Y.Z)

# 不変リリースを発行する（#48）。version を指定して手動起動し、以下を一気通貫で行う:
#   1. 起動 ref（既定 main）から dist を決定的にビルド
#   2. dist を焼き込んだ commit を生成（dist/ は VCS 管理外のため -f で強制ステージング）
#   3. その commit に release 固有タグ vX.Y.Z を「新規」作成して push（force-update しない）
#   4. そのタグに GitHub Release を発行 → Immutable Releases 有効時はタグが commit に固定（不変化）
#   5. floating major タグ（例 v1）を本リリース commit へ移動（利便用・可動）
#
# 旧実装（タグ push をトリガに公開済みタグを git push -f で付け替え）は immutability と
# 両立しないため廃止した。release 固有タグ vX.Y.Z の force-update は一切行わない
# （floating major タグは Release 非紐づけの可動タグなので force-update してよい）。
# Immutable Releases の有効化手順・検証手順は docs/release.md を参照。
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリース版（vX.Y.Z 形式。例: v1.2.3）'
        required: true
        type: string

# 同一 version の多重起動で commit→tag→release が並走するとタグ参照がレースする。
# リリースは中断したくないので cancel-in-progress は false。
concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

# タグ push・commit 作成・GitHub Release 発行に contents: write が要る。
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 起動 ref（既定 main）の commit を checkout する。dist はここから生成する。
      - name: Checkout
        uses: actions/checkout@v4

      # version 形式を検証し、既存タグへの再リリースを早期に弾く（immutable は再付与不可）。
      - name: Validate version and ensure tag is new
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version は vX.Y.Z 形式で指定する（受領値: ${VERSION}）"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "::error::タグ ${VERSION} は既に存在する。immutable リリースは再付与できない。版を上げて再実行する。"
            exit 1
          fi

      - name: Setup toolchain (mise → Node 24)
        uses: jdx/mise-action@v2

      # src + package-lock から dist を決定的に再生成する。
      - name: Build action (npm ci → ncc)
        run: |
          npm ci
          npm run build

      # dist を焼き込んだ commit を作り、その commit に新規タグを付けて push する。
      # commit は main へは戻さずタグ経由でのみ到達可能（dist を main から排除する #47 方針を維持）。
      - name: Bake dist and create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # dist/ は .gitignore 対象のため -f で強制ステージング。
          git add -f dist
          git commit -m "build(release): bake dist for ${VERSION}"
          # 新規タグのみ。force-update は行わない（immutability と両立させるため）。
          git tag "${VERSION}"
          git push origin "refs/tags/${VERSION}"

      # タグに GitHub Release を発行する。Immutable Releases 有効時はこの発行でタグが
      # commit に固定される。dist はタグの commit に含まれるため Release アセットは添付しない
      # （draft→アセット添付→publish の推奨フローはアセットがある場合の手順）。
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --verify-tag \
            --generate-notes

      # floating major タグ（例 v1）を本リリース commit へ移動する。HEAD は dist 焼込み commit。
      # Release に紐づかない可動タグのため force-update してよい（immutable 対象外）。
      # 前提: 常に「今リリースした commit」を指す前進リリース運用。古いマイナー/パッチ系列への
      # 後追いリリースでは major を巻き戻すため、その場合はこのステップを使わない（手動判断）。
      - name: Move floating major tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MAJOR="${VERSION%%.*}"   # v1.2.0 → v1
          git tag -f -a "${MAJOR}" -m "${VERSION}"
          git push -f origin "refs/tags/${MAJOR}"
